<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Gestor ISP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  .log-entry { transition: background-color 0.3s; }
  .log-entry:hover { background-color: rgba(59,130,246,0.1); }
  .log-new { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #log-table { scroll-behavior: smooth; }
  .detail-panel { transition: max-height 0.3s ease; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="app" class="w-full px-6 py-4">
  <!-- Top Bar -->
  <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <span class="text-2xl">&#128163;</span>
      <h1 class="text-xl font-bold text-white">Dashboard Gestor ISP</h1>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <div class="flex items-center gap-2">
        <span id="status-indicator" class="w-3 h-3 rounded-full bg-red-500 pulse"></span>
        <span id="status-text" class="text-gray-400">Desconectado</span>
      </div>
      <span id="clock" class="text-gray-400"></span>
      <span id="log-count" class="text-gray-500">0 logs</span>
    </div>
  </div>

  <!-- Filtros -->
  <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
    <select id="filter-instancia" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300">
      <option value="">Instancia: Todas</option>
    </select>
    <select id="filter-tag" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300">
      <option value="">Tarefa: Todas</option>
    </select>
    <select id="filter-nivel" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300">
      <option value="">Nivel: Todos</option>
      <option value="info">Info</option>
      <option value="sucesso">Sucesso</option>
      <option value="aviso">Aviso</option>
      <option value="erro">Erro</option>
    </select>
    <input id="filter-busca" type="text" placeholder="Buscar no log..." class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300 placeholder-gray-600">
    <label class="flex items-center gap-2 text-sm text-gray-400">
      <input type="checkbox" id="auto-scroll" checked class="accent-blue-500">
      Auto-scroll
    </label>
  </div>

  <!-- Cards Metricas -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <div class="text-gray-500 text-xs uppercase tracking-wide">Tempo Medio</div>
      <div id="metrica-tempo" class="text-2xl font-bold text-blue-400 mt-1">0ms</div>
    </div>
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <div class="text-gray-500 text-xs uppercase tracking-wide">Total Execucoes</div>
      <div id="metrica-total" class="text-2xl font-bold text-green-400 mt-1">0</div>
    </div>
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <div class="text-gray-500 text-xs uppercase tracking-wide">Erros</div>
      <div id="metrica-erros" class="text-2xl font-bold text-red-400 mt-1">0</div>
    </div>
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <div class="text-gray-500 text-xs uppercase tracking-wide">Taxa Sucesso</div>
      <div id="metrica-taxa" class="text-2xl font-bold text-emerald-400 mt-1">100%</div>
    </div>
  </div>

  <!-- Logs + Graficos -->
  <div class="grid grid-cols-1 lg:grid-cols-3 2xl:grid-cols-4 gap-4">
    <!-- Logs -->
    <div class="lg:col-span-2 2xl:col-span-3 bg-gray-900 rounded-lg border border-gray-800 overflow-hidden flex flex-col" style="max-height: 70vh;">
      <div class="text-xs text-gray-500 uppercase tracking-wide px-4 py-2 border-b border-gray-800 bg-gray-950">
        LOGS EM TEMPO REAL
      </div>
      <div id="log-table" class="overflow-y-auto flex-1 p-2 space-y-0.5">
        <div id="log-empty" class="text-center text-gray-600 py-16">
          <span class="text-4xl block mb-2">&#128225;</span>
          Aguardando logs...
        </div>
      </div>
    </div>

    <!-- Graficos -->
    <div class="space-y-4 overflow-y-auto" style="max-height: 70vh;">
      <div class="bg-gray-900 rounded-lg p-4 border border-gray-800" style="height:200px">
        <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">Tempo Medio por Handler</div>
        <canvas id="chart-barras"></canvas>
      </div>
      <div class="bg-gray-900 rounded-lg p-4 border border-gray-800" style="height:200px">
        <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">Distribuicao por Nivel</div>
        <canvas id="chart-pizza"></canvas>
      </div>
      <div class="bg-gray-900 rounded-lg p-4 border border-gray-800" style="height:200px">
        <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">Tempo de Execucao (ultimos 50)</div>
        <canvas id="chart-linha"></canvas>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel" class="mt-4 bg-gray-900 rounded-lg border border-gray-800 overflow-hidden hidden">
    <div class="flex items-center justify-between px-4 py-2 bg-gray-950 border-b border-gray-800">
      <span class="text-xs text-gray-500 uppercase tracking-wide">Detalhe do Log</span>
      <button onclick="fecharDetalhe()" class="text-gray-500 hover:text-white text-sm">&times;</button>
    </div>
    <pre id="detail-json" class="p-4 text-sm text-gray-300 overflow-x-auto"></pre>
  </div>
</div>

<script>
let logs = [];
let filteredLogs = [];
let charts = {};
let chartLinhaData = [];

function atualizarRelogio() {
  const agora = new Date();
  const fmt = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR');
  document.getElementById('clock').textContent = fmt;
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

function nivelCor(nivel) {
  const cores = { info: 'text-blue-400', sucesso: 'text-green-400', aviso: 'text-yellow-400', erro: 'text-red-400' };
  return cores[nivel] || 'text-gray-400';
}

function nivelIcone(nivel) {
  const icones = { info: '&#8505;', sucesso: '&#10003;', aviso: '&#9888;', erro: '&#10007;' };
  return icones[nivel] || '&#9679;';
}

function adicionarLog(entry) {
  logs.unshift(entry);
  if (logs.length > 10000) logs.pop();

  const instancias = new Set();
  const tags = new Set();
  logs.forEach(l => {
    if (l.instancia > 0) instancias.add(l.instancia);
    if (l.tag) tags.add(l.tag);
  });

  const selInst = document.getElementById('filter-instancia');
  const selTag = document.getElementById('filter-tag');
  const instAtual = selInst.value;
  const tagAtual = selTag.value;
  selInst.innerHTML = '<option value="">Instancia: Todas</option>' +
    [...instancias].sort((a,b) => a-b).map(i => `<option value="${i}">Instancia ${i}</option>`).join('');
  selInst.value = instAtual;

  selTag.innerHTML = '<option value="">Tarefa: Todas</option>' +
    [...tags].sort().map(t => `<option value="${t}">${t}</option>`).join('');
  selTag.value = tagAtual;

  filtrarErenderizar();
}

function filtrarErenderizar() {
  const fInstancia = document.getElementById('filter-instancia').value;
  const fTag = document.getElementById('filter-tag').value;
  const fNivel = document.getElementById('filter-nivel').value;
  const fBusca = document.getElementById('filter-busca').value.toLowerCase();
  const autoScroll = document.getElementById('auto-scroll').checked;

  filteredLogs = logs.filter(l => {
    if (fInstancia && l.instancia != fInstancia) return false;
    if (fTag && l.tag !== fTag) return false;
    if (fNivel && l.nivel !== fNivel) return false;
    if (fBusca && !l.mensagem.toLowerCase().includes(fBusca) && !l.tag.toLowerCase().includes(fBusca)) return false;
    return true;
  });

  const table = document.getElementById('log-table');
  const empty = document.getElementById('log-empty');

  if (filteredLogs.length === 0) {
    table.innerHTML = '<div id="log-empty" class="text-center text-gray-600 py-16"><span class="text-4xl block mb-2">&#128225;</span>Aguardando logs...</div>';
    document.getElementById('log-count').textContent = '0 logs';
    atualizarGraficos();
    return;
  }

  const html = filteredLogs.slice(0, 500).map((l, i) =>
    `<div class="log-entry log-new flex items-start gap-2 px-3 py-1.5 rounded cursor-pointer text-sm" onclick='abrirDetalhe(${JSON.stringify(JSON.stringify(l)).slice(1,-1)})'>
      <span class="text-gray-600 whitespace-nowrap shrink-0" style="width:5ch">${l.timestamp ? l.timestamp.slice(11, 19) : '--:--:--'}</span>
      <span class="${nivelCor(l.nivel)} w-4 shrink-0 text-center">${nivelIcone(l.nivel)}</span>
      <span class="text-gray-400 shrink-0" style="width:14ch" title="${l.tag || ''}">${l.tag || ''}</span>
      <span class="text-gray-600 shrink-0" style="width:10ch">${l.instancia > 0 ? 'Inst ' + l.instancia : ''}</span>
      <span class="text-gray-300 flex-1 truncate">${l.mensagem || ''}</span>
      ${l.duracao_ms > 0 ? `<span class="text-gray-500 shrink-0 text-right" style="width:7ch">${l.duracao_ms}ms</span>` : ''}
    </div>`
  ).join('');

  table.innerHTML = html;
  document.getElementById('log-count').textContent = filteredLogs.length + ' logs';

  if (autoScroll) {
    table.scrollTop = 0;
  }

  atualizarGraficos();
}

function abrirDetalhe(jsonStr) {
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
  try {
    const obj = JSON.parse(jsonStr);
    document.getElementById('detail-json').textContent = JSON.stringify(obj, null, 2);
  } catch(e) {
    document.getElementById('detail-json').textContent = jsonStr;
  }
}

function fecharDetalhe() {
  document.getElementById('detail-panel').classList.add('hidden');
}

['filter-instancia', 'filter-tag', 'filter-nivel', 'filter-busca', 'auto-scroll'].forEach(id => {
  document.getElementById(id).addEventListener('change', filtrarErenderizar);
  if (document.getElementById(id).tagName === 'INPUT' && id !== 'auto-scroll') {
    let debounce;
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(filtrarErenderizar, 200);
    });
  }
});

// Metricas
function atualizarMetricas(snap) {
  document.getElementById('metrica-tempo').textContent = snap.tempo_medio_ms > 0 ? snap.tempo_medio_ms.toFixed(1) + 'ms' : '0ms';
  document.getElementById('metrica-total').textContent = snap.total_execucoes;
  document.getElementById('metrica-erros').textContent = snap.total_erros;
  document.getElementById('metrica-taxa').textContent = snap.taxa_sucesso.toFixed(1) + '%';
}

function buscarMetricas() {
  fetch('/api/metricas')
    .then(r => r.json())
    .then(snap => {
      atualizarMetricas(snap);
    })
    .catch(() => {});
}

// Graficos
function initGraficos() {
  Chart.defaults.color = '#9CA3AF';
  Chart.defaults.font.size = 11;

  charts.barras = new Chart(document.getElementById('chart-barras'), {
    type: 'bar',
    data: { labels: [], datasets: [{ label: 'Tempo medio (ms)', data: [], backgroundColor: '#3B82F6', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  charts.pizza = new Chart(document.getElementById('chart-pizza'), {
    type: 'doughnut',
    data: { labels: ['Info', 'Sucesso', 'Aviso', 'Erro'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#3B82F6','#10B981','#F59E0B','#EF4444'] }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 8 } } } }
  });

  charts.linha = new Chart(document.getElementById('chart-linha'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Duracao (ms)', data: [], borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4, pointRadius: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } }
  });
}

function atualizarGraficos() {
  if (!charts.barras) return;

  const porTag = {};
  const porNivel = { info: 0, sucesso: 0, aviso: 0, erro: 0 };
  const duracoes = [];

  filteredLogs.slice(0, 500).forEach(l => {
    if (!porTag[l.tag]) porTag[l.tag] = { total: 0, tempo: 0 };
    porTag[l.tag].total++;
    if (l.duracao_ms > 0) {
      porTag[l.tag].tempo += l.duracao_ms;
      duracoes.push(l.duracao_ms);
    }
    porNivel[l.nivel] = (porNivel[l.nivel] || 0) + 1;
  });

  const labels = Object.keys(porTag).slice(0, 10);
  const data = labels.map(k => porTag[k].total > 0 ? Number((porTag[k].tempo / porTag[k].total).toFixed(1)) : 0);

  charts.barras.data.labels = labels;
  charts.barras.data.datasets[0].data = data;
  charts.barras.update();

  charts.pizza.data.datasets[0].data = [porNivel.info, porNivel.sucesso, porNivel.aviso, porNivel.erro];
  charts.pizza.update();

  const ultimos50 = duracoes.slice(-50);
  charts.linha.data.labels = ultimos50.map((_, i) => i);
  charts.linha.data.datasets[0].data = ultimos50;
  charts.linha.update();
}

// SSE
function conectarSSE() {
  const statusIndicator = document.getElementById('status-indicator');
  const statusText = document.getElementById('status-text');

  const evtSource = new EventSource('/api/events');

  evtSource.onopen = () => {
    statusIndicator.className = 'w-3 h-3 rounded-full bg-green-500';
    statusText.textContent = 'Conectado';
    statusText.className = 'text-green-400';
  };

  evtSource.onmessage = (event) => {
    try {
      const entry = JSON.parse(event.data);
      adicionarLog(entry);
    } catch(e) {}
  };

  evtSource.onerror = () => {
    statusIndicator.className = 'w-3 h-3 rounded-full bg-red-500 pulse';
    statusText.textContent = 'Reconectando...';
    statusText.className = 'text-red-400';
  };
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  initGraficos();
  buscarMetricas();
  conectarSSE();
  setInterval(buscarMetricas, 5000);
});
</script>
</body>
</html>

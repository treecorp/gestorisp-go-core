name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gestorisp-go-core

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verificar codigo
        run: go vet ./...

      - name: Compilar
        run: go build ./...

      - name: Definir tag Docker
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Build imagem Docker
        run: >
          docker build
          -t ${{ env.REGISTRY }}/${{ secrets.GH_USER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          -f Dockerfile .

      - name: Login GHCR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2'
        run: |
          echo "${{ secrets.GH_TOKEN }}" | docker login ${{ env.REGISTRY }} \
            -u ${{ secrets.GH_USER }} --password-stdin

      - name: Push imagem
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2'
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GH_USER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
